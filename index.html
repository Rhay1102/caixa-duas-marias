<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Caixa Doceria 💖</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Duas marias💖</h1>
</header>

<main class="container">

  <section class="card">
    <h2>💰 Lançamento</h2>

    <input id="descricao" placeholder="Descrição">
    <input id="valor" type="number" placeholder="Valor">

    <select id="tipo">
      <option value="entrada">Entrada 💖</option>
      <option value="saida">Saída 💸</option>
    </select>

    <input id="data" type="date">
    <input id="comprovante" type="file" accept="image/*">

    <button onclick="adicionar()">Adicionar</button>
  </section>

  <section class="card">
    <h2>💎 Resumo</h2>
    <p>Entradas: R$ <span id="entradas">0</span></p>
    <p>Saídas: R$ <span id="saidas">0</span></p>
    <h3>Total: R$ <span id="total">0</span></h3>
  </section>

  <section id="meses"></section>

</main>

<script src="script.js"></script>

</body>
</html>
